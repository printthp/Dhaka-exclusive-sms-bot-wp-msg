# /etc/nginx/sites-available/dhaka-bot
# Symlink: ln -s /etc/nginx/sites-available/dhaka-bot /etc/nginx/sites-enabled/
#
# Dhaka Exclusive Bot — Nginx Reverse Proxy
# Proxies :5000 (gunicorn/Flask) + serves static files

upstream dhaka_bot_backend {
    server 127.0.0.1:5000 fail_timeout=0;
}

# -------------------------------------------------------------------
# HTTP → HTTPS redirect (if SSL is set up)
# -------------------------------------------------------------------
server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # For Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other HTTP to HTTPS (uncomment after SSL is set up)
    # return 301 https://$host$request_uri;

    # --- If no SSL yet, serve directly on port 80 ---
    location / {
        proxy_pass http://dhaka_bot_backend;
        include /etc/nginx/proxy_params;
    }
}

