<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Dhaka Exclusive Admin{% endblock %}</title>
    
    <!-- 🔥 Tailwind CSS & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        /* --- GLOBAL PRESETS --- */
        *{margin:0;padding:0;box-sizing:border-box}
        body { background: #020617; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; height: 100dvh; overflow: hidden; }
        
        /* Glassmorphism Classes */
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .glass-dark { background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(10px); }
        
        /* Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        
        /* Layout Structure */
        .app-layout { display: flex; height: 100dvh; }
        .sidebar { width: 280px; flex-shrink: 0; border-right: 1px solid rgba(255,255,255,0.05); }
        .main-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .page-content { flex: 1; overflow-y: auto; padding: 2rem; }

        @media(max-width: 768px) {
            .sidebar { display: none; } /* Mobile hide sidebar for now */
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar (Optional, but good for navigation) -->
        <aside class="sidebar glass-dark flex flex-col p-6">
            <h1 class="text-xl font-black text-indigo-500 italic mb-10 tracking-tighter">DHAKA EXCLUSIVE</h1>
            <nav class="flex flex-col gap-4">
                <a href="/admin?tab=dashboard" class="flex items-center gap-3 p-4 rounded-2xl hover:bg-indigo-500/10 text-xs font-black uppercase tracking-widest transition-all">
                    <i class="fa-solid fa-gauge-high"></i> Dashboard
                </a>
                <a href="/admin?tab=chat" class="flex items-center gap-3 p-4 rounded-2xl hover:bg-indigo-500/10 text-xs font-black uppercase tracking-widest transition-all">
                    <i class="fa-solid fa-comments"></i> Inbox
                </a>
                <a href="/admin?tab=orders" class="flex items-center gap-3 p-4 rounded-2xl hover:bg-indigo-500/10 text-xs font-black uppercase tracking-widest transition-all">
                    <i class="fa-solid fa-box"></i> Orders
                </a>
            </nav>
        </aside>

        <!-- Main View Area -->
        <main class="main-view">
            <div class="page-content custom-scrollbar">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
</body>
</html>
