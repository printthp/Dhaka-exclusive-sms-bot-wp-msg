<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{% block title %}{% endblock %} - Dhaka Exclusive PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        html, body {
            margin: 0;
            padding: 0;
            height: 100dvh;
            max-height: 100dvh;
            overflow: hidden;
            background: #0f172a;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
        }
        .app-shell {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            max-height: 100dvh;
            overflow: hidden;
        }
        .mobile-nav {
            flex-shrink: 0;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar {
            position: fixed;
            top: 0; left: 0;
            width: 280px; height: 100dvh;
            background: #020617;
            border-right: 1px solid rgba(255,255,255,0.05);
            z-index: 50;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 40;
            display: none;
        }
        .sidebar-overlay.show { display: block; }
        .main-content {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        @media (min-width: 768px) {
            .mobile-nav, .sidebar-overlay { display: none !important; }
            .sidebar {
                position: relative;
                transform: none;
                height: 100dvh;
            }
            .app-shell { flex-direction: row; }
        }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .sidebar-link:hover { background: rgba(99, 102, 241, 0.1); color: #818cf8; }
        .sidebar-link { transition: all 0.2s; display: flex; align-items: center; padding: 12px 16px; border-radius: 12px; margin-bottom: 4px; color: #94a3b8; text-decoration: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="app-shell">
        <!-- Mobile Header -->
        <div class="mobile-nav md:hidden">
            <h1 class="text-lg font-black text-indigo-400 uppercase">Dhaka Pro</h1>
            <button onclick="toggleSidebar()" class="text-indigo-400"><i class="fa-solid fa-bars text-xl"></i></button>
        </div>

        <!-- Overlay -->
        <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="p-6 text-center hidden md:block">
                <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 uppercase">Dhaka Pro</h1>
                <p class="text-[9px] text-slate-600 font-black tracking-[0.3em] mt-1">V7 ULTIMATE</p>
            </div>
            <nav class="flex-1 px-4 overflow-y-auto">
                <p class="text-[10px] text-slate-600 font-bold uppercase tracking-widest ml-3 mb-2">Menu</p>
                <a href="/admin?tab=dashboard" class="sidebar-link"><i class="fa-solid fa-chart-pie w-6 text-indigo-500"></i> Dashboard</a>
                <a href="/admin?tab=orders" class="sidebar-link"><i class="fa-solid fa-shopping-cart w-6 text-emerald-500"></i> Orders</a>
                <a href="/admin?tab=chat" class="sidebar-link"><i class="fa-solid fa-comment-dots w-6 text-amber-500"></i> Chat {% if unread_chat_count > 0 %}<span class="ml-auto bg-indigo-600 text-white text-[10px] px-2 py-0.5 rounded-full">{{ unread_chat_count }}</span>{% endif %}</a>
                <a href="/admin?tab=inventory" class="sidebar-link"><i class="fa-solid fa-boxes-stacked w-6 text-purple-500"></i> Inventory</a>
                <a href="/admin?tab=settings" class="sidebar-link"><i class="fa-solid fa-sliders w-6 text-slate-400"></i> Settings</a>
            </nav>
            <div class="p-4 border-t border-white/5">
                <div class="flex items-center gap-3 p-3 rounded-2xl bg-slate-800/50">
                    <div class="w-9 h-9 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold text-sm">{{ session.get('username', 'A')[0].upper() }}</div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs font-bold text-white truncate">{{ session.get('username') }}</p>
                        <p class="text-[9px] text-slate-500">Admin</p>
                    </div>
                    <a href="/admin/logout" class="text-rose-400"><i class="fa-solid fa-right-from-bracket"></i></a>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.querySelector('.sidebar-overlay').classList.toggle('show');
        }
    </script>
</body>
</html>
