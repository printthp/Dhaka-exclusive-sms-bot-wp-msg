<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - Dhaka Exclusive PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .sidebar-link:hover { background: rgba(99, 102, 241, 0.1); color: #818cf8; border-left: 4px solid #6366f1; }
        .active-link { background: rgba(99, 102, 241, 0.15); color: #818cf8; border-left: 4px solid #6366f1; }
    </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row">
    <!-- Sidebar -->
    <aside class="w-full md:w-72 bg-[#020617] border-r border-slate-800 flex flex-col shrink-0">
        <div class="p-8 text-center">
            <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 uppercase tracking-tighter">Dhaka Pro</h1>
            <p class="text-[10px] text-slate-500 font-bold tracking-widest mt-1">V7 ULTIMATE ENGINE</p>
        </div>
        <nav class="flex-1 px-4 space-y-2 mt-4">
            <a href="/admin?tab=dashboard" class="sidebar-link flex items-center p-3 rounded-xl transition-all"><i class="fa-solid fa-chart-pie w-6"></i> ড্যাশবোর্ড</a>
            <a href="/admin?tab=orders" class="sidebar-link flex items-center p-3 rounded-xl transition-all"><i class="fa-solid fa-shopping-cart w-6"></i> অর্ডার ম্যানেজমেন্ট</a>
            <a href="/admin?tab=chat" class="sidebar-link flex items-center p-3 rounded-xl transition-all justify-between">
                <span><i class="fa-solid fa-comment-dots w-6"></i> লাইভ ইনবক্স</span>
                {% if unread_chat_count > 0 %}<span class="bg-indigo-500 text-white text-[10px] px-2 py-0.5 rounded-full font-bold">{{ unread_chat_count }}</span>{% endif %}
            </a>
            <a href="/admin?tab=settings" class="sidebar-link flex items-center p-3 rounded-xl transition-all"><i class="fa-solid fa-sliders w-6"></i> সেটিংস</a>
        </nav>
        <div class="p-6 border-t border-slate-800">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center font-bold text-xs">{{ session.get('username', 'A')[0].upper() }}</div>
                <span class="text-xs font-bold">{{ session.get('username') }}</span>
            </div>
            <a href="/admin/logout" class="flex items-center text-rose-400 text-xs font-bold hover:text-rose-300"><i class="fa-solid fa-right-from-bracket mr-2"></i> লগআউট</a>
        </div>
    </aside>
    <!-- Main -->
    <main class="flex-1 p-6 md:p-10 overflow-y-auto">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
