<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{% block title %}{% endblock %} - Dhaka Exclusive PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background: #0f172a; color: #e2e8f0;
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
        }
        /* Root layout */
        .app-root {
            display: flex; flex-direction: column;
            height: 100%; width: 100%;
        }
        @media (min-width: 768px) {
            .app-root { flex-direction: row; }
        }
        /* Mobile top bar */
        .mobile-top {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; background: rgba(2,6,23,0.95);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }
        @media (min-width: 768px) { .mobile-top { display: none; } }
        /* Sidebar */
        .sidebar {
            position: fixed; top: 0; left: 0;
            width: 260px; height: 100%;
            background: #020617; border-right: 1px solid rgba(255,255,255,0.05);
            z-index: 50; transform: translateX(-100%);
            transition: transform 0.25s ease;
            display: flex; flex-direction: column;
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            z-index: 45; display: none;
        }
        .sidebar-overlay.show { display: block; }
        @media (min-width: 768px) {
            .sidebar { position: relative; transform: none; flex-shrink: 0; }
            .sidebar-overlay { display: none !important; }
        }
        .sidebar-link {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; border-radius: 12px;
            color: #94a3b8; text-decoration: none; margin: 2px 12px;
            transition: all 0.2s; font-size: 14px;
        }
        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(99,102,241,0.1); color: #818cf8;
        }
        /* Main content area - THIS scrolls */
        .main-area {
            flex: 1;
            display: flex; flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .main-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 16px;
        }
        @media (min-width: 768px) {
            .main-scroll { padding: 24px; }
        }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="app-root">
        <!-- Mobile Header -->
        <div class="mobile-top">
            <h1 class="text-lg font-black text-indigo-400 uppercase tracking-tight">Dhaka Pro</h1>
            <button onclick="toggleSidebar()" class="text-indigo-400 bg-slate-800 w-9 h-9 rounded-lg flex items-center justify-center">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>

        <!-- Overlay -->
        <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="p-6 text-center hidden md:block">
                <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 uppercase">Dhaka Pro</h1>
                <p class="text-[9px] text-slate-600 font-black tracking-[0.3em] mt-1">V7 ULTIMATE</p>
            </div>
            <nav class="flex-1 overflow-y-auto px-2 py-2">
                <p class="text-[10px] text-slate-600 font-bold uppercase tracking-widest px-4 mb-2">Menu</p>
                <a href="/admin?tab=dashboard" class="sidebar-link {% if request.args.get('tab') == 'dashboard' %}active{% endif %}">
                    <i class="fa-solid fa-chart-pie w-5 text-center text-indigo-500"></i> Dashboard
                </a>
                <a href="/admin?tab=orders" class="sidebar-link {% if request.args.get('tab') == 'orders' %}active{% endif %}">
                    <i class="fa-solid fa-shopping-cart w-5 text-center text-emerald-500"></i> Orders
                </a>
                <a href="/admin?tab=pathao_import" class="sidebar-link {% if request.args.get('tab') == 'pathao_import' %}active{% endif %}">
                    <i class="fa-solid fa-file-import w-5 text-center text-orange-400"></i> Import
                </a>
                <a href="/admin?tab=chat" class="sidebar-link {% if request.args.get('tab') == 'chat' %}active{% endif %}">
                    <i class="fa-solid fa-comment-dots w-5 text-center text-amber-500"></i> Chat
                    {% if unread_chat_count > 0 %}<span class="ml-auto bg-indigo-600 text-white text-[10px] px-2 py-0.5 rounded-full">{{ unread_chat_count }}</span>{% endif %}
                </a>
                <a href="/admin?tab=inventory" class="sidebar-link {% if request.args.get('tab') == 'inventory' %}active{% endif %}">
                    <i class="fa-solid fa-boxes-stacked w-5 text-center text-purple-500"></i> Inventory
                </a>
                <a href="/admin?tab=settings" class="sidebar-link {% if request.args.get('tab') == 'settings' %}active{% endif %}">
                    <i class="fa-solid fa-sliders w-5 text-center text-slate-400"></i> Settings
                </a>
            </nav>
            <div class="p-4 border-t border-white/5 shrink-0">
                <div class="flex items-center gap-3 p-3 rounded-2xl bg-slate-800/50">
                    <div class="w-9 h-9 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold text-sm">
                        {{ session.get('username', 'A')[0].upper() }}
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs font-bold text-white truncate">{{ session.get('username') }}</p>
                        <p class="text-[9px] text-slate-500">Admin</p>
                    </div>
                    <a href="/admin/logout" class="text-rose-400 hover:text-rose-300"><i class="fa-solid fa-right-from-bracket"></i></a>
                </div>
            </div>
        </aside>

        <!-- Main Area -->
        <div class="main-area">
            <div class="main-scroll">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }
        // Auto-close sidebar on link click (mobile)
        document.querySelectorAll('.sidebar-link').forEach(l => {
            l.addEventListener('click', () => {
                if (window.innerWidth < 768) toggleSidebar();
            });
        });
    </script>
</body>
</html>
