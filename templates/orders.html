{% extends "base.html" %}
{% block title %}Orders{% endblock %}
{% block content %}
<div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
    <h2 class="text-3xl font-black text-white">অর্ডার ম্যানেজমেন্ট</h2>
    <div class="flex gap-2 w-full md:w-auto">
        <input type="text" placeholder="সার্চ করুণ..." class="bg-slate-900 border border-slate-800 rounded-2xl px-5 py-2 text-sm outline-none focus:border-indigo-500 flex-1">
        <button class="bg-indigo-600 px-6 py-2 rounded-2xl text-xs font-bold">ফিল্টার</button>
    </div>
</div>

<div class="glass rounded-[2rem] overflow-hidden shadow-2xl">
    <table class="w-full text-left text-sm">
        <thead>
            <tr class="bg-white/5 text-slate-500 text-[10px] uppercase font-black">
                <th class="p-6">ID</th><th class="p-6">কাস্টমার</th><th class="p-6 text-center">বিল</th><th class="p-6 text-right">অ্যাকশন</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-slate-800/50">
            {% for o in orders %}
            <tr class="hover:bg-white/5 transition">
                <td class="p-6 font-mono text-indigo-400 font-bold">#{{ o.id }}</td>
                <td class="p-6">
                    <div class="font-bold text-slate-100">{{ o.name }}</div>
                    <div class="text-xs text-slate-500 mt-1">{{ o.phone }}<br>{{ o.address }}</div>
                </td>
                <td class="p-6 text-center font-black text-emerald-400 text-lg">{{ o.total }}৳</td>
                <td class="p-6 text-right">
                    <a href="/invoice/{{ o.id }}" target="_blank" class="p-3 bg-slate-800 rounded-2xl hover:bg-slate-700 transition inline-block">
                        <i class="fa-solid fa-print"></i>
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
