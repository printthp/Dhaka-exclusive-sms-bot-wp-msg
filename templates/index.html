<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <nav class="bg-gray-800 p-4 border-b border-gray-700">
        <h1 class="text-xl font-bold text-indigo-400">Business Manager - System Core</h1>
    </nav>

    <div class="container mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-gray-800 p-4 rounded-lg border border-gray-700">
                <p class="text-gray-400">ইঞ্জিন স্ট্যাটাস</p>
                <h2 id="engine-status" class="text-2xl font-bold text-green-400">Checking...</h2>
            </div>
            </div>

        <div class="bg-gray-800 p-6 rounded-lg border border-gray-700">
            <h2 class="text-lg font-bold mb-4">কন্ট্রোল প্যানেল</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <button onclick="runEngine('catalog')" class="bg-indigo-600 hover:bg-indigo-700 p-3 rounded font-bold">সিঙ্ক ক্যাটালগ</button>
                <button onclick="runEngine('sync_orders')" class="bg-green-600 hover:bg-green-700 p-3 rounded font-bold">অর্ডার সিঙ্ক</button>
                <button onclick="runEngine('train_ai')" class="bg-yellow-600 hover:bg-yellow-700 p-3 rounded font-bold">এআই ট্রেনিং</button>
                <button onclick="runEngine('status')" class="bg-purple-600 hover:bg-purple-700 p-3 rounded font-bold">সিস্টেম স্ট্যাটাস</button>
            </div>
        </div>

        <div class="mt-8 bg-black p-4 rounded border border-gray-800 font-mono text-sm text-green-500 overflow-y-auto h-40">
            <p>> কনসোল আউটপুট...</p>
            <div id="output"></div>
        </div>
    </div>

    <script>
        async function runEngine(cmd) {
            document.getElementById('output').innerHTML += `<p>> Executing: ${cmd}...</p>`;
            const res = await fetch('/api/engine', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({cmd: cmd})
            });
            const data = await res.json();
            document.getElementById('output').innerHTML += `<p class="text-white">Result: ${data.result}</p>`;
            if(cmd === 'status') document.getElementById('engine-status').innerText = data.result;
        }
    </script>
</body>
</html>
